kind = "web"
previewPath = "/"
title = "Center Fitness"
version = "1.0.0"
id = "artifacts/center-fitness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25434

[services.development]
run = "pnpm --filter @workspace/center-fitness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/center-fitness", "run", "build" ]
publicDir = "artifacts/center-fitness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25434"
BASE_PATH = "/"
